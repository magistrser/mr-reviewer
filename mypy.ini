[mypy]
disallow_untyped_defs = True
exclude = (?x)(
    venv/
  | .venv/
  | python_template/
  | tests/
  | .pr-review-workspaces/
  | infrastructure/migrations/
  )

[mypy-application.publish_review]
ignore_errors = True

[mypy-application.review_flow]
ignore_errors = True

[mypy-application.review_preview]
ignore_errors = True

[mypy-domain.review.*]
ignore_errors = True

[mypy-infrastructure.cli.output]
ignore_errors = True

[mypy-infrastructure.cli.preview]
ignore_errors = True

[mypy-infrastructure.gitlab.compact]
ignore_errors = True
