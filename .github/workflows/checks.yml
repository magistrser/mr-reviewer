name: Checks

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  checks:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Run flake8
        run: uv run flake8

      - name: Run mypy
        run: uv run mypy .

      - name: Run tests
        env:
          PYTHONPYCACHEPREFIX: /tmp/mr-review-pyc
        run: >
          uv run pytest -s --color=yes --junitxml=report.xml
          --cov=application --cov=domain --cov=infrastructure
          --cov-config=.coverage_conf --cov-fail-under 70
